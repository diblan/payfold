spring:
  application:
    name: renewal-producer
  datasource:
    url: jdbc:postgresql://localhost:5432/yourdb
    username: youruser
    password: yourpassword
  jackson:
    time-zone: Europe/Brussels
  rabbitmq:
    publisher-confirm-type: correlated
    publisher-returns: true
    template:
      mandatory: true
  batch:
    jdbc:
      initialize-schema: never


app:
  timezone: Europe/Brussels
  scanPageSize: 10000
  publishPageSize: 10000
  confirmTimeoutMs: 10000
  scheduleCron: "0 0 3 * * *"   # 03:00 local by default


rabbitmq:
  exchange: billing.renewals
  routingKey: renewal.requested

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,renewal-job
  endpoint:
    health:
      show-details: never
